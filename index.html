        function toggleSchool(schoolId) {
            const content = document.getElementById(`content-${schoolId}`);
            const chevron = document.getElementById(`chevron-${schoolId}`);
            
            content.classList.toggle('active');
            chevron.classList.toggle('active');
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            let html = '';

            scheduleData.forEach((day, dayIndex) => {
                html += `
                    <div class="mb-6">
                        <div class="bg-indigo-600 text-white rounded-t-xl px-6 py-3 font-semibold text-lg flex items-center gap-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${day.date}
                        </div>
                        <div class="bg-white rounded-b-xl shadow-lg overflow-hidden">
                `;

                day.schools.forEach((school, schoolIndex) => {
                    const schoolId = `${dayIndex}-${schoolIndex}`;
                    html += `
                        <div class="border-b last:border-b-0">
                            <button onclick="toggleSchool('${schoolId}')" class="w-full px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">

                                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>

                                </div>
                                <svg id="chevron-${schoolId}" class="chevron text-gray-400" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                                    <div class="flex items-center gap-3 text-gray-700">
                                        <svg class="text-indigo-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                                        </svg>

                                            <p class="text-base">${school.time}</p>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <div class="flex items-center gap-2 mb-3">
                                            <svg class="text-indigo-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
