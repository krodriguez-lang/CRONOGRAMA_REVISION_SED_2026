<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronograma de Revisión de Informes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eff6ff, #e0e7ff);
      padding: 24px;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      padding: 32px;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      color: #1e3a5f;
    }

    .header .subtitle {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 10px;
    }

    .header p {
      margin: 0;
      font-size: 1.1rem;
      color: #4b5563;
    }

    .day {
      margin-bottom: 24px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      background: white;
    }

    .day-title {
      background: #4f46e5;
      color: white;
      padding: 16px 24px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    .school-button {
      width: 100%;
      background: white;
      border: none;
      border-top: 1px solid #e5e7eb;
      padding: 18px 24px;
      text-align: left;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .school-button:hover {
      background: #f9fafb;
    }

    .school-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
    }

    .details {
      display: none;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      padding: 20px 24px 24px;
    }

    .details.active {
      display: block;
    }

    .label {
      font-size: 0.95rem;
      font-weight: bold;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .time {
      margin-bottom: 20px;
      font-size: 1.05rem;
    }

    .contacts-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    .contact-card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .contact-team {
      font-size: 0.85rem;
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 4px;
    }

    .pending {
      color: #d97706;
      font-style: italic;
      font-weight: bold;
    }

    .whatsapp-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      text-decoration: none;
      background: #22c55e;
      color: white;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .whatsapp-link:hover {
      background: #16a34a;
    }

    .arrow {
      font-size: 1.2rem;
      color: #6b7280;
    }
  </style>
</head>

            <button class="school-button" onclick="toggleDetails('detail-${dayIndex}-${schoolIndex}', 'arrow-${dayIndex}-${schoolIndex}')">
              <div class="school-left">

                Enlace de la comunidad de WhatsApp
              </a>

          </div>
        `).join("")}
      </div>
    `).join("");

    function toggleDetails(detailId, arrowId) {
      const detail = document.getElementById(detailId);
      const arrow = document.getElementById(arrowId);
      const isActive = detail.classList.contains("active");

      document.querySelectorAll(".details").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".arrow").forEach(el => el.textContent = "▼");

      if (!isActive) {
        detail.classList.add("active");
        arrow.textContent = "▲";
      }
    }
